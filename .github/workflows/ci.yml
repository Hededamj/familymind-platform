name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Using `npm install` (not `npm ci`) because the lockfile is
        # regenerated on Windows, which drops Linux-specific optional deps
        # (@emnapi, @rolldown/binding-wasm32-wasi). `npm install` is tolerant
        # of platform drift. Revisit when a Linux/WSL env is standard.
        run: npm install --no-audit --no-fund

      # Prisma client must be generated before typecheck/tests can import it.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Lint
        run: npx eslint .

# Note: `next build` is intentionally not run here. Vercel builds every PR as a
# preview deploy, so duplicating it in CI would be wasted minutes. If we ever
# leave Vercel, reinstate a build step with the required DB env secrets.
