name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma client must be generated before typecheck/tests can import it.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      # Lint currently reports ~45 pre-existing errors (React setState-in-effect,
      # Cannot create components during render, no-unescaped-entities, a few
      # no-explicit-any). Reporting-only until that debt is swept; then drop
      # `continue-on-error` to make lint blocking.
      - name: Lint (report only)
        run: npx eslint .
        continue-on-error: true

# Note: `next build` is intentionally not run here. Vercel builds every PR as a
# preview deploy, so duplicating it in CI would be wasted minutes. If we ever
# leave Vercel, reinstate a build step with the required DB env secrets.
